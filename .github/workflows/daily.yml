name: Daily Briefing

on:
  schedule:
    # 7am EST (UTC-5) = 12:00 UTC  |  runs at 8am during EDT (summer)
    - cron: "0 12 * * *"
  workflow_dispatch: # allow manual run from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_2 }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/state.json
          git diff --staged --quiet || git commit -m "Daily briefing: $(date -u +%Y-%m-%d)"
          git push
